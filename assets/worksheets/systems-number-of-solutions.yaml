title: "Systems: How Many Solutions?"
subtitle: "Integrated Math 101 — Comparing Lines in Slope-Intercept Form"

content:
  goal: "I can decide whether a system has one solution, no solution, or infinite solutions by comparing the two lines."

  solutionRules:
    - ["Different", "Anything", "One solution"]
    - ["Same", "Different", "No solution"]
    - ["Same", "Same", "Infinite solutions"]

  guidedExamples:
    - id: 1
      equations: ["y=2x+3", "y=-x+6"]
      work: "Different slopes"
      result: "One solution"

    - id: 2
      equations: ["y=4x+1", "y=4x-5"]
      work: "Same slope, different y-intercepts"
      result: "No solution"

    - id: 3
      equations: ["y=3x-2", "2y=6x-4"]
      work: "Divide by 2, so \\(y=3x-2\\)"
      result: "Infinite solutions"

    - id: 4
      equations: ["y=-2x+7", "y+1=-2x+4"]
      work: "Subtract 1, so \\(y=-2x+3\\)"
      result: "No solution"

  practiceProblems:
    - id: 5
      equations: ["y=x+5", "y=3x-1"]
      work: "Different slopes"
      result: "One solution"

    - id: 6
      equations: ["y=-2x+8", "y=-2x-4"]
      work: "Same slope, different y-intercepts"
      result: "No solution"

    - id: 7
      equations: ["y=5x+2", "2y=10x+4"]
      work: "Divide by 2, so \\(y=5x+2\\)"
      result: "Infinite solutions"

    - id: 8
      equations: ["y=3x-2", "y+4=3x+1"]
      work: "Subtract 4, so \\(y=3x-3\\)"
      result: "No solution"

pages:
  - header: true
    sections:
      - type: "goal"

      - type: "solution-count"
        title: "Part A — Guided Examples"
        source: "guidedExamples"
        rulesSource: "solutionRules"
        columns: "2"
        workspaceLines: 2

  - sections:
      - type: "solution-count"
        title: "Part B — You Try"
        source: "practiceProblems"
        rulesSource: "solutionRules"
        columns: "2"
        workspaceLines: 4