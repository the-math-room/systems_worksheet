title: "Systems of Linear Equations"
subtitle: "Integrated Math 101 — Scaffolded Practice"
goal: "I can choose a solving method, solve simple systems, and decide how many solutions a system has."

methodClues:
  - clue: "Opposites are lined up, like \\( +y \\) and \\( -y \\)"
    method: "Add"
  - clue: "Same term is lined up, like \\( 2x \\) and \\( 2x \\)"
    method: "Subtract"
  - clue: "\\( y = \\) is already alone"
    method: "Substitute for \\( y \\)"
  - clue: "\\( x = \\) is already alone"
    method: "Substitute for \\( x \\)"

methodRecognition:
  - id: 1
    system:
      - "x+y=9"
      - "x-y=3"
    notice: "\\( +y \\) and \\( -y \\) are opposites"
    method: "Add"
  - id: 2
    system:
      - "2x+y=11"
      - "2x+3y=17"
    notice: "\\( 2x \\) and \\( 2x \\) match"
    method: "Subtract"
  - id: 3
    system:
      - "y=x+5"
      - "3x+y=13"
    notice: "\\( y \\) is alone"
    method: "Substitute for \\( y \\)"
  - id: 4
    system:
      - "x=y+2"
      - "x+4y=17"
    notice: "\\( x \\) is alone"
    method: "Substitute for \\( x \\)"

eliminationGuided:
  - id: 5
    title: "Elimination by Addition"
    system:
      - "x+y=10"
      - "x-y=4"
    hint: "Use addition when one variable has opposites, like \\( +y \\) and \\( -y \\)."
    steps:
      - label: "Step 1"
        prompt: "Add straight down."
        math: "\\( x+x= \\) {{2x}} &nbsp; \\( y+(-y)= \\) {{0}}"
      - label: "Step 2"
        prompt: "Solve."
        math: "\\( 2x=14 \\) so \\( x= \\) {{7}}"
      - label: "Step 3"
        prompt: "Substitute back."
        math: "\\( 7+y=10 \\) so \\( y= \\) {{3}}"
    solution: "\\((7,3)\\)"
  - id: 6
    title: "Elimination by Subtraction"
    system:
      - "x+3y=15"
      - "x+y=7"
    hint: "Use subtraction when one variable term is exactly the same in both equations."
    steps:
      - label: "Step 1"
        prompt: "Subtract straight down."
        math: "\\( x-x= \\) {{0}} &nbsp; \\( 3y-y= \\) {{2y}}"
      - label: "Step 2"
        prompt: "Solve."
        math: "\\( 2y=8 \\) so \\( y= \\) {{4}}"
      - label: "Step 3"
        prompt: "Substitute back."
        math: "\\( x+4=7 \\) so \\( x= \\) {{3}}"
    solution: "\\((3,4)\\)"

eliminationPractice:
  - id: 7
    title: "Try Addition"
    system:
      - "2x+y=13"
      - "x-y=2"
    prompts:
      - "Add straight down: \\(3x=\\) {{15}}"
      - "\\(x=\\) {{5}}"
      - "Substitute: \\(5-y=2\\), so \\(y=\\) {{3}}"
    solution: "\\((5,3)\\)"
  - id: 8
    title: "Try Subtraction"
    system:
      - "3x+2y=16"
      - "3x+y=11"
    prompts:
      - "Subtract straight down: \\(y=\\) {{5}}"
      - "Substitute: \\(3x+5=11\\)"
      - "\\(3x=\\) {{6}}, so \\(x=\\) {{2}}"
    solution: "\\((2,5)\\)"

substitutionGuided:
  - id: 9
    title: "Substitution for \\( y \\)"
    system:
      - "y=x+2"
      - "2x+y=14"
    hint: "If you see \\( y= \\) already, replace \\( y \\) in the other equation."
    steps:
      - label: "Step 1"
        prompt: "Replace \\( y \\)."
        math: "\\( 2x+(x+2)=14 \\)"
      - label: "Step 2"
        prompt: "Solve."
        math: "\\( 3x+2=14 \\), so \\( 3x=12 \\), so \\( x= \\) {{4}}"
      - label: "Step 3"
        prompt: "Find \\( y \\)."
        math: "\\( y=4+2 \\), so \\( y= \\) {{6}}"
    solution: "\\((4,6)\\)"
  - id: 10
    title: "Substitution for \\( x \\)"
    system:
      - "x=y+1"
      - "x+2y=13"
    hint: "If you see \\( x= \\) already, replace \\( x \\) in the other equation."
    steps:
      - label: "Step 1"
        prompt: "Replace \\( x \\)."
        math: "\\( (y+1)+2y=13 \\)"
      - label: "Step 2"
        prompt: "Solve."
        math: "\\( 3y+1=13 \\), so \\( 3y=12 \\), so \\( y= \\) {{4}}"
      - label: "Step 3"
        prompt: "Find \\( x \\)."
        math: "\\( x=4+1 \\), so \\( x= \\) {{5}}"
    solution: "\\((5,4)\\)"

substitutionPractice:
  - id: 11
    title: "Try Substitution for \\( y \\)"
    system:
      - "y=2x-1"
      - "x+y=11"
    prompts:
      - "Replace \\(y\\): \\(x+(2x-1)=11\\)"
      - "Solve: \\(3x-1=11\\), so \\(3x=\\) {{12}}, so \\(x=\\) {{4}}"
      - "Find \\(y\\): \\(y=2(4)-1=\\) {{7}}"
    solution: "\\((4,7)\\)"
  - id: 12
    title: "Try Substitution for \\( x \\)"
    system:
      - "x=2y-3"
      - "x+y=12"
    prompts:
      - "Replace \\(x\\): \\((2y-3)+y=12\\)"
      - "Solve: \\(3y-3=12\\), so \\(3y=\\) {{15}}, so \\(y=\\) {{5}}"
      - "Find \\(x\\): \\(x=2(5)-3=\\) {{7}}"
    solution: "\\((7,5)\\)"

solutionRules:
  - ["Different", "Anything", "One solution"]
  - ["Same", "Different", "No solution"]
  - ["Same", "Same", "Infinite solutions"]

solutionCount:
  - id: 13
    equations:
      - "y=2x+3"
      - "y=-x+6"
    work: "Different slopes"
    result: "One solution"
  - id: 14
    equations:
      - "y=4x+1"
      - "y=4x-5"
    work: "Same slope, different y-intercepts"
    result: "No solution"
  - id: 15
    equations:
      - "y=3x-2"
      - "2y=6x-4"
    work: "Divide by 2, so \\(y=3x-2\\)"
    result: "Infinite solutions"
  - id: 16
    equations:
      - "y=-2x+7"
      - "y+1=-2x+4"
    work: "Subtract 1, so \\(y=-2x+3\\)"
    result: "No solution"

exitTicket:
  - title: "1. When should you use addition?"
    body: >-
      I should use addition when I see <span class="blank blank--lg"></span>.
  - title: "2. When should you use substitution?"
    body: >-
      I should use substitution when <span class="blank blank--lg"></span>.
  - title: "3. Solve."
    body: >-
      \\(\\begin{cases}x+y=8\\\\x-y=2\\end{cases}\\)<br />Solution: <span class="blank blank--md"></span>
