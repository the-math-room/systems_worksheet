<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Worksheet Site</title>

  <link
    rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23111827'/%3E%3Ctext x='32' y='41' text-anchor='middle' font-family='Arial, Helvetica, sans-serif' font-size='30' font-weight='700' fill='white'%3EΣ%3C/text%3E%3C/svg%3E"
  />

  <link rel="stylesheet" href="./assets/css/styles.css" />

  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(', '\\)'], ['$', '$']] },
      chtml: {
        fontURL: 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/output/chtml/fonts/woff-v2'
      }
    };
  </script>

  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>

  <script type="module" src="./assets/js/app.js"></script>
</head>
<body>
  <div id="toolbar" class="toolbar screen-only"></div>
  <div id="worksheet-picker" class="screen-panel screen-only"></div>
  <div id="status" class="status screen-only" role="status">Loading worksheet…</div>
  <div id="worksheet-root"></div>
</body>
</html>
